    var height=y1-y0;var relY=(y0+y1)/2/ht;
    var avgLum=0,blkCnt=0;
    tg.forEach(function(r){for(var c=0;c<cols;c++){var b=blocks[r*cols+c];if(b){avgLum+=b.lum;blkCnt++}}});
    avgLum=blkCnt?avgLum/blkCnt:128;

    // Classify: large bright text near top = headline, small text = body, button-shaped = CTA
    var type="body_text";
    if(height>ht*.08&&relY<.35)type="headline";
    else if(height>ht*.06&&relY<.5)type="headline";
    else if(height<ht*.06&&height>ht*.02){
      // Check if it's a CTA button (compact, high contrast, mid-to-lower position)
      var bandContrast=Math.abs(avgLum-128);
      if(relY>.3&&bandContrast>40&&tg.length<=2)type="cta"}

    elements.push({type:type,y:y0/ht,x:0.05,w:0.9,h:height/ht,
      label:type==="headline"?"Headline":type==="cta"?"CTA":"Body Text",
      attentionShare:type==="headline"?.25:type==="cta"?.15:.08})});

  // 2. Find brand/logo region (small high-contrast area, typically corners)
  var bestLogo=null,bestLogoScore=0;
  blocks.forEach(function(b){
    if(b.edgeDens>.15&&b.edgeDens<.55&&Math.abs(b.lum-128)>25){
      var cornerBonus=(b.x<cols*.2||b.x>cols*.8)&&(b.y<rows*.2||b.y>rows*.8)?1.5:1;
      var score=b.edgeDens*cornerBonus*(1+Math.abs(b.lum-128)/128);
      if(score>bestLogoScore){bestLogoScore=score;bestLogo=b}}});
  if(bestLogo&&bestLogoScore>.2)elements.push({type:"brand",y:bestLogo.py/ht,x:bestLogo.px/w,
    w:bkSz*2/w,h:bkSz*2/ht,label:"Brand/Logo",attentionShare:.12});

  // 3. Find face/person region
  if(scoreResult&&scoreResult.hasFace){
    var bestSkin=null,bestSkinR=0;
    blocks.forEach(function(b){if(b.skinRatio>bestSkinR){bestSkinR=b.skinRatio;bestSkin=b}});
    if(bestSkin)elements.push({type:"face",y:Math.max(0,bestSkin.py/ht-.05),
      x:Math.max(0,bestSkin.px/w-.05),w:.15,h:.2,label:"Face/Person",attentionShare:.2})}

  // 4. Remaining area is hero image
  var textArea=elements.reduce(function(a,el){return a+el.w*el.h},0);
  if(textArea<.7)elements.push({type:"hero_image",y:0,x:0,w:1,h:1,
    label:"Hero Image",attentionShare:Math.max(.1,.3-textArea)});

  // Calculate predicted TTFF for each element (lower = noticed faster)
  // Based on: saliency rank, size, contrast, position (centre bias)
  elements.forEach(function(el,i){
    var sizeFactor=Math.sqrt(el.w*el.h);
    var centreBias=1-Math.abs((el.y+el.h/2)-.45)*1.5; // centre of image favoured
    var typePriority=el.type==="face"?.3:el.type==="headline"?.5:el.type==="hero_image"?.4:el.type==="cta"?.8:el.type==="brand"?.9:1;
    el.predictedTTFF=+(typePriority*(1.5-sizeFactor*2)*(2-centreBias)).toFixed(2);
    el.predictedTTFF=Math.max(.2,Math.min(4,el.predictedTTFF))});

  // Sort by predicted TTFF (what gets noticed first)
  elements.sort(function(a,b){return a.predictedTTFF-b.predictedTTFF});

  // Industry benchmarks for TTFF (seconds)
  var benchmarks={headline:{ttff:.8,label:"Headline"},cta:{ttff:1.1,label:"CTA"},brand:{ttff:1.4,label:"Brand/Logo"},
    face:{ttff:.4,label:"Face"},hero_image:{ttff:.3,label:"Hero Image"},body_text:{ttff:1.8,label:"Body Text"}};

  elements.forEach(function(el){
    var bm=benchmarks[el.type];
    if(bm){el.benchmarkTTFF=bm.ttff;el.vsBenchmark=el.predictedTTFF<=bm.ttff?"faster":"slower"}});

  return elements}

// Compute Share of Attention per element using the actual saliency map
function computeShareOfAttention(elements,heatmapData){
  if(!elements||!elements.length||!heatmapData||!heatmapData.map)return elements;
  var map=heatmapData.map,sw=heatmapData.sw,sh=heatmapData.sh;
  // Total saliency across entire image
  var totalSal=0;for(var i=0;i<map.length;i++)totalSal+=map[i];
  if(totalSal<0.01)return elements;

  elements.forEach(function(el){
    // Sample saliency within this element's bounding box
    var x0=Math.floor(el.x*sw),y0=Math.floor(el.y*sh);
    var x1=Math.min(sw-1,Math.floor((el.x+el.w)*sw));
    var y1=Math.min(sh-1,Math.floor((el.y+el.h)*sh));
    var elSal=0;
    for(var y=y0;y<=y1;y++)for(var x=x0;x<=x1;x++){
      if(y>=0&&y<sh&&x>=0&&x<sw)elSal+=map[y*sw+x]}
    el.shareOfAttention=+(elSal/totalSal).toFixed(3);
    // Local Attention Score: average saliency within this element (0-1)
    var elPixels=Math.max(1,(x1-x0+1)*(y1-y0+1));
    el.localAttentionScore=+(elSal/elPixels).toFixed(3)});

  return elements}

  var att=scoreResult&&scoreResult.dims.attention_capture?scoreResult.dims.attention_capture.score:0;

  // Universal checks (all platforms)
  checks.push({rule:"Clear headline or key message",pass:hasHeadline,
    tip:"Add a prominent headline that communicates your key message in under 2 seconds.",category:"creative"});
  checks.push({rule:"CTA visible",pass:hasCta,
    tip:"Include a clear call-to-action button or text. 'Shop Now', 'Learn More', 'Sign Up'.",category:"creative"});
  checks.push({rule:"Brand element present",pass:hasBrand||scoreResult.research.brandRegions>0,
    tip:"Add your logo or brand name. Brand elements receive the most fixations per unit area (Wedel & Pieters 2000).",category:"brand"});
  checks.push({rule:"Visual hierarchy clear",pass:cl>.45,

  // Platform-specific checks
  if(channel==="meta_feed"||channel==="meta_stories"||channel==="programmatic_display"){
    checks.push({rule:"Text under 20% of image area",pass:textRatio<.22,
      tip:"Meta recommends minimal text overlay. Ads with less text typically get better delivery.",category:"platform",platform:"Meta"});
    checks.push({rule:"Key message readable in 2 seconds",pass:hasHeadline&&cl>.4,

    if(hasFace)checks.push({rule:"Face drives engagement",pass:true,

    if(!isVideo)checks.push({rule:"Consider video or motion",pass:false,
      tip:"Video ads on Meta get 10-30% higher engagement than static. Consider adding motion.",category:"platform",platform:"Meta"})}

  if(channel==="tiktok_feed"){
    if(!isVideo)checks.push({rule:"Video format required",pass:false,

      tip:"Full-screen vertical video maximises screen real estate.",category:"platform",platform:"TikTok"});
    checks.push({rule:"Text on screen in first 2 seconds",pass:hasHeadline,
      tip:"TikTok viewers decide to scroll or watch within 2 seconds. Put your hook text on screen immediately.",category:"platform",platform:"TikTok"});
    checks.push({rule:"Native/authentic aesthetic",pass:cl>.5&&textRatio<.3,
      tip:"Over-produced ads underperform on TikTok. Use a lo-fi, creator-style aesthetic.",category:"platform",platform:"TikTok"})}

  if(channel==="youtube_preroll"){
    checks.push({rule:"Brand in first 5 seconds",pass:hasBrand,
      tip:"YouTube ABCDs: Show your brand within the first 5 seconds. Many viewers skip at 5s.",category:"platform",platform:"YouTube"});
    checks.push({rule:"Hook in first 3 seconds",pass:att>.5,
      tip:"Open with a strong visual hook. YouTube pre-roll is skippable — earn the watch.",category:"platform",platform:"YouTube"});
    checks.push({rule:"Clear CTA before skip point",pass:hasCta,
      tip:"Place your CTA before the 5-second skip button appears.",category:"platform",platform:"YouTube"});
    checks.push({rule:"16:9 landscape format",pass:true,
      tip:"YouTube pre-roll should be landscape (16:9) for desktop and TV viewers.",category:"platform",platform:"YouTube"})}

  if(channel==="connected_tv"){
    checks.push({rule:"Brand prominent throughout",pass:hasBrand,
      tip:"CTV viewers are lean-back. Keep brand visible throughout — they won't interact.",category:"platform",platform:"CTV"});
    checks.push({rule:"Simple message",pass:cl>.5,
      tip:"CTV ads are viewed from 6-10 feet away. Large text, simple layouts only.",category:"platform",platform:"CTV"});
    checks.push({rule:"No small text or fine print",pass:textRatio<.25,
      tip:"Text smaller than 40px is unreadable on TV. Remove disclaimers or make them huge.",category:"platform",platform:"CTV"})}

  if(channel==="email_crm"){
    checks.push({rule:"Works without images loaded",pass:hasHeadline&&copyText.length>5,
      tip:"40% of email clients block images by default. Ensure your message works as text-only.",category:"platform",platform:"Email"});
    checks.push({rule:"Single clear CTA",pass:hasCta,
      tip:"Emails with one CTA get 371% more clicks than those with multiple (WordStream).",category:"platform",platform:"Email"});
    checks.push({rule:"Above the fold content",pass:hasHeadline,
      tip:"Put your key message and CTA above the fold — many readers don't scroll.",category:"platform",platform:"Email"})}

  if(channel==="retail_media"){
    checks.push({rule:"Product clearly visible",pass:att>.45,
      tip:"Retail media shoppers are in buying mode. Product visibility is the #1 driver.",category:"platform",platform:"Retail"});

  // Score compliance
  var passCount=checks.filter(function(c){return c.pass}).length;
  var total=checks.length;
  var complianceScore=total>0?passCount/total:0;
  var grade=complianceScore>=.8?"Ready":complianceScore>=.6?"Needs work":"Not ready";

// === BACKTEST CALIBRATION ===
// Compares CARF scores against actual campaign performance data
function runBacktest(entries){
  // entries: [{carfScore, actual, label}]
  if(!entries||entries.length<3)return null;
  var n=entries.length;
  var sumX=0,sumY=0,sumXY=0,sumX2=0,sumY2=0;
  entries.forEach(function(e){sumX+=e.carfScore;sumY+=e.actual;sumXY+=e.carfScore*e.actual;sumX2+=e.carfScore*e.carfScore;sumY2+=e.actual*e.actual});
  var denom=Math.sqrt((n*sumX2-sumX*sumX)*(n*sumY2-sumY*sumY));
  var r=denom>0?(n*sumXY-sumX*sumY)/denom:0;

  // Prediction accuracy: how often does higher CARF score = higher actual performance?
  var correct=0,pairs=0;
  for(var i=0;i<n;i++){for(var j=i+1;j<n;j++){
    if(entries[i].carfScore!==entries[j].carfScore&&entries[i].actual!==entries[j].actual){
      pairs++;
      if((entries[i].carfScore>entries[j].carfScore)===(entries[i].actual>entries[j].actual))correct++}}}
  var pairAccuracy=pairs>0?correct/pairs:0;

  return{correlation:+r.toFixed(3),pairAccuracy:+(pairAccuracy*100).toFixed(1),
    n:n,meanCarf:+(sumX/n).toFixed(3),meanActual:+(sumY/n).toFixed(4),
    verdict:r>.6?"Strong correlation \u2014 Attention Probability is predictive for your ads.":r>.3?"Moderate correlation \u2014 Attention Probability captures some signal. Consider testing with more ads.":"Weak correlation \u2014 Attention Probability may not be predictive for your specific category. Try comparing ads from the same campaign.",
    entries:entries}}

// === EAID DATASET CALIBRATION ===
// Runs regression: CARF dimension scores → EAID human ratings
// Finds optimal dimension weights that maximise correlation
function runEaidCalibration(ratings,scoredImages){
  if(!ratings||!scoredImages||scoredImages.length<10)return null;
  var n=Math.min(ratings.length,scoredImages.length);

  // Extract dimension scores as matrix
  var dimNames=["attention_capture","emotional_resonance","cognitive_load","memory_encoding","decision_heuristics"];
  var X=[];
  for(var i=0;i<n;i++){
    var d=scoredImages[i].dims;if(!d)continue;
    X.push(dimNames.map(function(dm){return d[dm]?d[dm].score:0.5}))}

  // Get average rating per image (average across all numeric columns)
  var Y=[];
  var ratingKeys=Object.keys(ratings[0]||{}).filter(function(k){return typeof ratings[0][k]==="number"});
  for(var i=0;i<n;i++){
    if(!ratings[i])continue;
    var vals=ratingKeys.map(function(k){return ratings[i][k]}).filter(function(v){return typeof v==="number"&&!isNaN(v)});
    if(vals.length)Y.push(vals.reduce(function(a,b){return a+b},0)/vals.length)}

  var matched=Math.min(X.length,Y.length);
  X=X.slice(0,matched);Y=Y.slice(0,matched);
  if(matched<10)return null;

  // Current default weights
  var currentW=[0.35,0.20,0.20,0.10,0.15];
  var currentPred=X.map(function(row){return row.reduce(function(s,v,j){return s+v*currentW[j]},0)});
  var currentR=pearsonR(currentPred,Y);

  // Search for optimal weights (random + grid search)
  var bestR=currentR;var bestW=currentW.slice();

  // Random search
  for(var trial=0;trial<5000;trial++){
    var w=randomDirichlet(5);
    var pred=X.map(function(row){return row.reduce(function(s,v,j){return s+v*w[j]},0)});
    var r2=pearsonR(pred,Y);
    if(r2>bestR){bestR=r2;bestW=w}}

  // Refine around best found
  for(var refine=0;refine<2000;refine++){
    var w2=bestW.map(function(v){return Math.max(0.01,v+((Math.random()-0.5)*0.1))});
    var wSum=w2.reduce(function(a,b){return a+b},0);
    w2=w2.map(function(v){return v/wSum});
    var pred2=X.map(function(row){return row.reduce(function(s,v,j){return s+v*w2[j]},0)});
    var r3=pearsonR(pred2,Y);
    if(r3>bestR){bestR=r3;bestW=w2}}

  var optimalWeights={};
  dimNames.forEach(function(dm,i){optimalWeights[dm]=+bestW[i].toFixed(4)});

  return{
    nImages:matched,ratingCols:ratingKeys,
    currentR:currentR,calibratedR:bestR,
    improvement:((bestR-currentR)/Math.max(Math.abs(currentR),0.01))*100,
    weights:optimalWeights}}

function pearsonR(x,y){
  var n=Math.min(x.length,y.length);if(n<3)return 0;
  var sx=0,sy=0,sxy=0,sx2=0,sy2=0;
  for(var i=0;i<n;i++){sx+=x[i];sy+=y[i];sxy+=x[i]*y[i];sx2+=x[i]*x[i];sy2+=y[i]*y[i]}
  var denom=Math.sqrt((n*sx2-sx*sx)*(n*sy2-sy*sy));
  return denom>0?(n*sxy-sx*sy)/denom:0}

function randomDirichlet(k){
  var vals=[];for(var i=0;i<k;i++){var u=Math.random();vals.push(-Math.log(Math.max(u,1e-10)))}
  var sum=vals.reduce(function(a,b){return a+b},0);
  return vals.map(function(v){return v/sum})}

function forecastPerformance(scoreResult,channel,objective,adPurposeData){
  if(!scoreResult)return null;

  // Use AI-detected purpose as fallback if objective is "triage"
  var obj=objective==="triage"&&adPurposeData&&adPurposeData.purpose?adPurposeData.purpose:(objective==="triage"?"direct_response":objective);

  // Calculate channel-specific adjusted score (how well THIS creative fits THIS channel's priorities)
  function scoreForChannel(ch,o){
    var chWeights=CHS[ch]?CHS[ch].w:null;
    var objPriority=OBJS[o]?OBJS[o].p:null;
    if(!chWeights||!objPriority)return 0.5;

    // Blend channel weights (60%) with objective priorities (40%)
    var blended={};
    Object.keys(chWeights).forEach(function(dm){
      blended[dm]=chWeights[dm]*0.6+(objPriority[dm]||0.5)*0.4});

    // Normalise blended weights
    var wSum=Object.values(blended).reduce(function(a,b){return a+b},0);
    Object.keys(blended).forEach(function(dm){blended[dm]/=wSum});

    // Calculate weighted score
    var score=0;
    Object.keys(blended).forEach(function(dm){
      var dimScore=scoreResult.dims[dm]?scoreResult.dims[dm].score:0.5;
      score+=dimScore*blended[dm]});

    return score}

  // Score this creative across ALL channels
  var channelScores={};
  Object.keys(CHS).forEach(function(ch){
    channelScores[ch]={score:scoreForChannel(ch,obj),name:CHS[ch].n}});

  // Current channel's score
  var myScore=channelScores[channel]?channelScores[channel].score:0.5;

  // Find best-fit channel
  var bestCh=Object.keys(channelScores).reduce(function(best,ch){
    return channelScores[ch].score>channelScores[best].score?ch:best},Object.keys(channelScores)[0]);

  // Translate CARF score to expected percentile
  // A CARF score of 0.5 = ~50th percentile (median performance)
  // 0.7 = ~75th percentile, 0.85 = ~90th percentile, 0.3 = ~20th percentile
  function scoreToPercentile(s){
    // Sigmoid-like mapping: 0.5 → 50, 0.7 → 75, 0.8 → 85, 0.9 → 95
    return Math.max(5,Math.min(95,Math.round(50+(s-0.5)*100)))}

  var percentile=scoreToPercentile(myScore);

  // Look up benchmarks for this channel + objective

    if(!range)return null;
    // range = [bottom, median, top10%] corresponding to p10, p50, p90

    if(percentile<=50)return range[0]+(range[1]-range[0])*((percentile-10)/40);
    if(percentile<=90)return range[1]+(range[2]-range[1])*((percentile-50)/40);
    return range[2]*(1+(percentile-90)/50)}

  var predicted=null;
  if(bench){
    predicted={
      ctr:interpolateMetric(bench.ctr),
      cvr:interpolateMetric(bench.cvr),
      roas:interpolateMetric(bench.roas),
      cpm:interpolateMetric(bench.cpm),
      engagement_rate:interpolateMetric(bench.engagement_rate),
      hook_rate:interpolateMetric(bench.hook_rate),
      hold_rate:interpolateMetric(bench.hold_rate),
      ad_recall_lift:interpolateMetric(bench.ad_recall_lift)

  var confidence=Math.min(0.85,0.5+Math.abs(myScore-0.5)*0.8);

  // Rank channels by fit
  var channelRanking=Object.keys(channelScores).map(function(ch){

// === ATTENTION PROBABILITY SCORE ===
// Audience-independent, objective-independent creative quality metric
// Measures: "What is the probability that any viewer will actually see the key elements of this creative?"
// Based on element-level P(fixation) derived from size, contrast, position, and predicted TTFF
// Aligned with IAB 2025 Attention Measurement Guidelines
function calcAttentionProbability(scoreResult,elements){
  if(!scoreResult)return null;

  // Get key dimension scores
  var att=scoreResult.dims.attention_capture?scoreResult.dims.attention_capture.score:0.5;
  var cl=scoreResult.dims.cognitive_load?scoreResult.dims.cognitive_load.score:0.5;
  var mem=scoreResult.dims.memory_encoding?scoreResult.dims.memory_encoding.score:0.5;

  // === 1. BOTTOM-UP ATTENTION PROBABILITY ===
  // Likelihood the creative captures stimulus-driven attention
  // Derived from contrast, edge density, colour saturation, saliency spread
  var sub=scoreResult.dims.attention_capture&&scoreResult.dims.attention_capture.sub;
  var contrast=att*0.9+0.05; // attention score is already composite
  var centreFocus=scoreResult.research&&scoreResult.research.centreSaliencyRatio?scoreResult.research.centreSaliencyRatio:0.3;
  var imgDominance=scoreResult.research&&scoreResult.research.imgRegionRatio?scoreResult.research.imgRegionRatio:0.6;
  var hasFace=scoreResult.hasFace||false;

  // P(first fixation) — how likely the eye lands somewhere useful on first glance
  // CAT2000 calibration: centre bias is 2.5x more predictive than any other feature (r=0.544 vs r=0.211)
  // Faces: CAT2000 skin heuristic was negatively correlated — but real face detection still matters for ads
  // Reduced face bonus, increased centre weight
  var pFirstFixation=0.25+contrast*0.3+centreFocus*0.35+(hasFace?0.08:0)+imgDominance*0.08;
  pFirstFixation=Math.max(0.05,Math.min(0.98,pFirstFixation));

  // === 2. ELEMENT-LEVEL FIXATION PROBABILITIES ===
  // P(seeing key elements) = probability of fixating on each important element
  var keyElementProbs={};
  var essentialElements=["headline","cta","brand"];

  if(elements&&elements.length>0){
    essentialElements.forEach(function(type){
      var el=elements.find(function(e){return e.type===type});
      if(el){
        // TTFF inverse: faster fixation = higher probability
        // TTFF of 0.3s = 0.95, 1.0s = 0.75, 2.0s = 0.45, 3.0s = 0.25
        var pEl=Math.max(0.1,Math.min(0.98,1.1-el.predictedTTFF*0.3));
        keyElementProbs[type]=pEl
      }else{
        keyElementProbs[type]=0.15 // Element absent — very low probability of being seen
      }})}
  else{
    // Fallback: no element detection available, use dimension scores
    keyElementProbs.headline=Math.max(0.2,att*0.85);
    keyElementProbs.cta=Math.max(0.15,scoreResult.dims.decision_heuristics?scoreResult.dims.decision_heuristics.score*0.8:0.3);
    keyElementProbs.brand=Math.max(0.15,mem*0.75)}

  // === 3. COMPOSITE SCORES ===
  // P(brand noticed) — critical for awareness/memory
  var pBrandNoticed=keyElementProbs.brand||0.3;

  // P(CTA noticed) — critical for action/conversion
  var pCtaNoticed=keyElementProbs.cta||0.3;

  // P(headline read) — critical for message comprehension
  var pHeadlineRead=keyElementProbs.headline||0.3;

  // P(full message received) — probability ALL essential elements are seen
  // Using joint probability with correlation factor (elements near each other are seen together)
  var correlation=0.3; // elements in the same ad are somewhat correlated
  var pAll=pFirstFixation*(pBrandNoticed*correlation+pBrandNoticed*pCtaNoticed*(1-correlation));
  pAll=Math.max(0.02,Math.min(0.95,pAll));

  // === 4. COGNITIVE LOAD PENALTY ===
  // If the ad is too complex, even fixated elements may not be processed
  // Research: Pieters et al. 2010 — visual complexity negatively impacts brand information processing
  var clPenalty=cl<0.4?0.85:cl<0.6?0.95:1.0;

  // === 5. OVERALL ATTENTION PROBABILITY ===
  // Single score 0-100% representing overall likelihood of effective attention
  // Weighted blend: first fixation matters most (can't see anything if you miss the ad entirely)
  var overall=(pFirstFixation*0.35+pBrandNoticed*0.25+pCtaNoticed*0.20+pHeadlineRead*0.20)*clPenalty;
  overall=Math.max(0.02,Math.min(0.98,overall));

  // === 6. BENCHMARK COMPARISON ===
  // Industry research: median ad ~35-40%, top 25% ~55%+, top 10% ~65%+
  var percentile;
  if(overall>=0.75)percentile=95;
  else if(overall>=0.65)percentile=90;
  else if(overall>=0.55)percentile=75;
  else if(overall>=0.45)percentile=60;
  else if(overall>=0.38)percentile=50;
  else if(overall>=0.30)percentile=35;
  else if(overall>=0.22)percentile=20;
  else percentile=10;

  // Use letter grades that match CARF's grading scale for consistency
  var letter=percentile>=90?"A+":percentile>=75?"A":percentile>=60?"B":percentile>=50?"C":percentile>=35?"D":"F";
  var rating=percentile>=90?"Exceptional":percentile>=75?"Strong":percentile>=60?"Good":percentile>=50?"Average":percentile>=35?"Below Average":"Weak";
  var ratingColor=percentile>=75?"#1A9E8F":percentile>=60?"#2E75B6":percentile>=50?"#D97706":"#E8503A";

  // Verdict and weakest link
  var weakestLink=null;
  if(pFirstFixation<0.5)weakestLink={area:"First impression",score:pFirstFixation,fix:"Increase overall visual contrast, colour saturation, or saliency of the primary focal point."};
  else if(pBrandNoticed<0.4)weakestLink={area:"Brand visibility",score:pBrandNoticed,fix:"Make the brand logo larger, higher contrast, or position it more prominently."};
  else if(pCtaNoticed<0.4)weakestLink={area:"CTA visibility",score:pCtaNoticed,fix:"Make the CTA button bigger, use contrasting colours, or add directional cues pointing to it."};
  else if(pHeadlineRead<0.5)weakestLink={area:"Headline readability",score:pHeadlineRead,fix:"Increase headline size, improve contrast with background, or simplify the text."};
  else if(clPenalty<1)weakestLink={area:"Cognitive load",score:clPenalty,fix:"Reduce visual clutter — even if elements are fixated, complexity prevents processing."};

  return{
    overall:+overall.toFixed(3),
    percentile:percentile,
    letter:letter,
    rating:rating,
    ratingColor:ratingColor,
    components:{
      firstFixation:+pFirstFixation.toFixed(3),
      brandNoticed:+pBrandNoticed.toFixed(3),
      ctaNoticed:+pCtaNoticed.toFixed(3),
      headlineRead:+pHeadlineRead.toFixed(3),
      fullMessageReceived:+pAll.toFixed(3),
      cognitiveLoadPenalty:+clPenalty.toFixed(3)
    },
    weakestLink:weakestLink,
    verdict:overall>=0.55?"Strong attention probability. This creative is likely to capture attention across any audience or channel.":
      overall>=0.45?"Decent attention probability. Effective in favourable conditions (engaged audience, low clutter placements).":
      overall>=0.35?"Below-average attention probability. May struggle in competitive feeds or low-attention environments.":
      "Low attention probability. Likely to be overlooked regardless of targeting. Fix the weakest link before spending."
  }}

// Video frame extraction
function extractFrames(videoEl,interval,maxFrames,canvas,ch,onFrame,onDone){
  var dur=videoEl.duration;if(!dur||isNaN(dur)||dur<=0){onDone([]);return}
  var times=[];for(var t=0;t<dur;t+=interval){times.push(t);if(times.length>=maxFrames)break}
  if(times.length===0){onDone([]);return}

  function finish(){if(!done){done=true;videoEl.onseeked=null;onDone(results)}}
  var globalTimer=setTimeout(function(){finish()},30000);
  
  function grabAndNext(){
    try{
      var w=videoEl.videoWidth,ht=videoEl.videoHeight;
      if(w&&ht){
        var mx=240;if(Math.max(w,ht)>mx){var sc=mx/Math.max(w,ht);w=Math.round(w*sc);ht=Math.round(ht*sc)}

  // Forecast engine (browser-based: percentile-based prediction from CSV data + CARF scores)
  function buildForecast(parsed,perf,dims,obj){
    if(!parsed||!perf||!dims||perf.error)return null;
    var pm=perf.pm;if(!pm)return null;
    var vals=parsed.rows.map(function(r){return r[pm]}).filter(function(v){return v!==null&&!isNaN(v)});
    if(vals.length<5)return null;
    vals.sort(function(a,b){return a-b});
    var n=vals.length;
    // Current ad's composite score as a proxy for portfolio ranking
    var composite=0;var nDims=0;for(var dk in DIMS){if(dims[dk]){composite+=dims[dk].score;nDims++}}
    composite=nDims?composite/nDims:.5;
    // Map composite to percentile (assume roughly linear relationship)
    var estPct=Math.max(5,Math.min(95,composite*100));
    var estIdx=Math.max(0,Math.min(n-1,Math.round(estPct/100*n)));
    var predicted=vals[estIdx];
    var lowIdx=Math.max(0,Math.round(Math.max(5,estPct-15)/100*n));
    var highIdx=Math.min(n-1,Math.round(Math.min(95,estPct+15)/100*n));
    var predLow=vals[lowIdx],predHigh=vals[highIdx];
    // Similar ads: find the middle 40% of the portfolio
    var simStart=Math.max(0,Math.round((estPct-20)/100*n));
    var simEnd=Math.min(n,Math.round((estPct+20)/100*n));
    var simSlice=vals.slice(simStart,simEnd);
    var simMedian=simSlice.length?simSlice[Math.floor(simSlice.length/2)]:predicted;
    var simMin=simSlice.length?simSlice[0]:predicted;
    var simMax=simSlice.length?simSlice[simSlice.length-1]:predicted;
    // Per-dimension impact estimate
    var objPri=(OBJS[obj]||OBJS.direct_response).p;
    var impacts=[];
    for(var dk in DIMS){var pri=objPri[dk]||.5;var sc=dims[dk]?dims[dk].score:.5;var gap=Math.max(0,.7-sc);var potentialLift=gap*pri*20;impacts.push({dim:dk,label:DIMS[dk].l,current:sc,priority:pri,potentialLift:+potentialLift.toFixed(1),note:gap<=0?"Already strong":"Improving by "+gap.toFixed(2)+" could lift "+pm.toUpperCase()+" ~"+potentialLift.toFixed(0)+"%"})}
    impacts.sort(function(a,b){return b.potentialLift-a.potentialLift});
    // All metrics forecast
    var allForecasts={};
    for(var mk in perf.metricSummaries){var ms=perf.metricSummaries[mk];allForecasts[mk]={predicted:+(ms.p25+(ms.p75-ms.p25)*(estPct/100)).toFixed(6),low:+ms.p25.toFixed(6),high:+ms.p75.toFixed(6),median:+ms.median.toFixed(6)}}

    var rawLoad=dims.cognitive_load&&dims.cognitive_load.comp?dims.cognitive_load.comp.raw_load:.35;
    for(var c in CHS){
      var chDef=CHS[c];
      var compatible=!chDef.fmt||chDef.fmt.indexOf(adFormat)>=0;
      var chW=chDef.w;
      var chCL=clC(rawLoad,c);
      var adj=0;
      for(var dm in DIMS){
        var sc=dm==="cognitive_load"?chCL:(dims[dm]?dims[dm].score:0);
        adj+=sc*(chW[dm]||.2)}
      results[c]={score:+adj.toFixed(4),name:chDef.n,cl:+chCL.toFixed(4),compatible:compatible}}
    return results}

  // === COPY ANALYSIS ===
  function analyzeCopy(text){
    if(!text||!text.trim())return null;
    var words=text.trim().split(/\s+/);var wc=words.length;var chars=text.trim().length;
    var sentences=text.split(/[.!?]+/).filter(function(s){return s.trim().length>0}).length||1;
    var avgWordLen=words.reduce(function(a,w){return a+w.length},0)/wc;
    // Readability (Flesch-Kincaid approximation)
    var syllables=words.reduce(function(a,w){var s=w.toLowerCase().replace(/[^a-z]/g,"");var c=s.replace(/[^aeiouy]/g,"").length;return a+Math.max(1,c)},0);
    var fk=206.835-1.015*(wc/sentences)-84.6*(syllables/wc);var readability=Math.max(0,Math.min(100,fk));
    // Urgency keywords
    var urgencyWords=["now","today","limited","hurry","last","fast","instant","free","save","exclusive","only","ends","rush","quick","don't miss","act now","while","before"];
    var urgencyCount=0;var lower=text.toLowerCase();urgencyWords.forEach(function(u){if(lower.indexOf(u)>=0)urgencyCount++});
    // CTA keywords
    var ctaWords=["buy","shop","get","try","start","sign up","subscribe","download","learn","discover","claim","order","book","call","click","tap","swipe","join"];
    var ctaCount=0;ctaWords.forEach(function(c){if(lower.indexOf(c)>=0)ctaCount++});
    // Emotional words
    var emoWords=["love","amazing","incredible","beautiful","perfect","dream","feel","heart","joy","wow","transform","change","life","best","new","excited","happy","free","powerful","stunning"];
    var emoCount=0;emoWords.forEach(function(e2){if(lower.indexOf(e2)>=0)emoCount++});
    // Social proof
    var proofWords=["trusted","million","review","rated","award","best-selling","#1","top","proven","certified","guaranteed","verified","customers","people","join"];
    var proofCount=0;proofWords.forEach(function(p){if(lower.indexOf(p)>=0)proofCount++});
    // Number/specificity
    var hasNumbers=/\d/.test(text);var hasPercent=/%|percent/i.test(text);var hasDollar=/\$|\£|\€/.test(text);
    var specificity=(hasNumbers?1:0)+(hasPercent?1:0)+(hasDollar?1:0);

    var scores={
      readability:Math.min(1,readability/80),
      brevity:wc<=5?1:wc<=10?.85:wc<=20?.65:wc<=35?.4:.2,
      urgency:Math.min(1,urgencyCount/3),
      cta_clarity:Math.min(1,ctaCount/2),
      emotional_tone:Math.min(1,emoCount/3),
      social_proof:Math.min(1,proofCount/2),
      specificity:Math.min(1,specificity/2)};
    var overall=Object.values(scores).reduce(function(a,v){return a+v},0)/Object.keys(scores).length;
    return{scores:scores,overall:+overall.toFixed(4),wordCount:wc,readabilityScore:+readability.toFixed(0),
      verdict:overall>.65?"Strong copy — clear, compelling, and action-oriented.":overall>.45?"Decent copy but could be sharper. "+(!ctaCount?"Add a clear CTA. ":"")+(urgencyCount<1?"Add urgency language. ":"")+(wc>25?"Too many words — simplify. ":""):"Weak copy. "+(wc>30?"Way too long for an ad. ":"")+(ctaCount<1?"No call to action. ":"")+(emoCount<1?"No emotional language. ":"")+"Rewrite with fewer words and a clearer message."}}

  // === OFFER ANALYSIS ===
  function analyzeOffer(text){
    if(!text||!text.trim())return null;
    var lower=text.toLowerCase();
    var hasDiscount=/\d+%\s*off|save\s*\$?\d|half\s*price|bogo|buy\s*one/i.test(text);
    var hasFreeShipping=/free\s*(shipping|delivery)/i.test(text);
    var hasPrice=/\$\d+|\£\d+|\€\d+|\d+\.\d{2}/.test(text);
    var hasFree=/\bfree\b/i.test(text);
    var hasTrial=/trial|demo|sample/i.test(text);
    var hasGuarantee=/guarantee|money.back|risk.free|no.risk/i.test(text);
    var hasScarcity=/limited|only\s*\d|few\s*left|last\s*chance|ends\s*(today|soon|tonight)|while\s*(supplies|stocks)/i.test(text);
    var hasTimeframe=/today|now|this\s*week|hours|minutes|midnight|ends\s+\w/i.test(text);
    var hasCode=/code[\s:]/i.test(text);
    var hasSpecificNumber=/\d/.test(text);

    // Score each criterion as pass/fail with clear labels
    var criteria=[
      {key:"value",label:"Clear value",pass:hasDiscount||hasFreeShipping||hasFree,
        good:"Specific value stated",bad:"No clear value — what does the customer get?",
        tip:"State the exact saving: '25% off', '$20 off', 'Free shipping'"},
      {key:"specificity",label:"Specific numbers",pass:hasSpecificNumber&&(hasDiscount||hasPrice),
        good:"Concrete numbers make it real",bad:"Vague — add specific amounts",
        tip:"'Save 30%' beats 'Big savings'. '$49' beats 'Great price'"},
      {key:"urgency",label:"Time pressure",pass:hasScarcity||hasTimeframe,
        good:"Creates reason to act now",bad:"No urgency — why act today?",
        tip:"Add 'Today only', 'Ends Sunday', 'Limited stock'"},
      {key:"risk",label:"Risk reduction",pass:hasGuarantee||hasTrial||hasFreeShipping,
        good:"Lowers barrier to purchase",bad:"No safety net for the buyer",
        tip:"Add 'Free returns', 'Money-back guarantee', 'Free trial'"},
      {key:"code",label:"Activation path",pass:hasCode||hasTrial,
        good:"Clear way to redeem",bad:"How does the customer use this?",
        tip:"Add a promo code, 'Shop now' link, or 'Use code: X'"},
    ];

    var passCount=criteria.filter(function(c){return c.pass}).length;
    var total=criteria.length;
    var overall=passCount/total;

    // Star rating (1-5)
    var stars=Math.max(1,Math.min(5,Math.round(passCount)));
    var ratingLabel=["","Weak","Basic","Solid","Strong","Compelling"][stars];

    var verdict;
    if(stars>=4)verdict="Strong offer — "+passCount+"/"+total+" criteria met. "+criteria.filter(function(c){return c.pass}).map(function(c){return c.good}).join(". ")+".";
    else if(stars>=3)verdict="Decent offer but missing: "+criteria.filter(function(c){return!c.pass}).map(function(c){return c.label.toLowerCase()}).join(", ")+".";
    else verdict="Weak offer. Add: "+criteria.filter(function(c){return!c.pass}).slice(0,2).map(function(c){return c.tip}).join(". ")+".";

    return{criteria:criteria,passCount:passCount,total:total,overall:+overall.toFixed(4),
      stars:stars,ratingLabel:ratingLabel,verdict:verdict,
      scores:{value_clarity:hasDiscount||hasFree?1:0,specificity:hasSpecificNumber?1:0,
        scarcity:hasScarcity||hasTimeframe?1:0,risk_reduction:hasGuarantee||hasTrial||hasFreeShipping?1:0}}}

  // === AUDIENCE CONTEXT ===
  var AUDIENCES={general:{l:"General",adj:0,note:"No audience adjustment"},
    cold:{l:"Cold — Never heard of you",adj:-.08,note:"Cold audiences need stronger hooks and more social proof. Trust signals are critical."},
    warm:{l:"Warm — Aware of brand",adj:.04,note:"Warm audiences respond to emotional depth and product details. You can be more complex."},
    hot:{l:"Hot — Previous customer",adj:.06,note:"Retargeting audiences need less convincing. Focus on the offer and CTA clarity."},
    lookalike:{l:"Lookalike",adj:-.03,note:"Lookalikes behave like cold with slightly better attention. Hook quality is paramount."},
    interest:{l:"Interest-based",adj:.02,note:"Interest targeting gives you a slight relevance advantage. Lead with category-specific visuals."}};
  var TARGETINGS={broad:{l:"Broad",adj:-.05,note:"Broad targeting means your ad competes with everything. Maximum hook strength needed."},
    narrow:{l:"Narrow/Interest",adj:.03,note:"Narrower targeting means more relevant impressions. You can afford slightly more complexity."},
    retarget:{l:"Retargeting",adj:.06,note:"Retargeting gives you familiarity advantage. Prioritise offer and CTA over attention."},
    custom:{l:"Custom Audience",adj:.04,note:"Custom audiences know you. Brand recognition does the work — focus on conversion."},
    lookalike2:{l:"Lookalike",adj:0,note:"Lookalikes are statistically similar to your customers but haven't engaged yet. Treat as warm-cold hybrid."}};

  // Combined context score adjustment
  function contextAdjustment(){
    var audAdj=(AUDIENCES[audience]||AUDIENCES.general).adj;
    var tgtAdj=(TARGETINGS[targeting]||TARGETINGS.broad).adj;
    return{adj:audAdj+tgtAdj,
      audience:AUDIENCES[audience]||AUDIENCES.general,
      targeting:TARGETINGS[targeting]||TARGETINGS.broad}}

  // AI-powered creative extraction: sends image to Claude to extract copy, offer, and classify purpose
  // Describe each scanpath fixation using Claude vision — crops area around each fixation
  // and asks Claude what's there. Updates scanpath state progressively.
  function describeScanpathFixations(imgSrc,spData){
    if(!spData||!spData.scanpath||!spData.scanpath.length)return;
    // Load full image first
    var fullImg=new Image();
    fullImg.onload=function(){
      var w=fullImg.naturalWidth,h=fullImg.naturalHeight;
      // Crop a small region around each fixation and base64-encode them
      var cropSize=Math.min(w,h)*0.2; // 20% of smaller dim — captures the area the eye focuses
      var crops=spData.scanpath.map(function(f){
        var cx=f.x_ratio*w,cy=f.y_ratio*h;
        var x0=Math.max(0,cx-cropSize/2),y0=Math.max(0,cy-cropSize/2);
        var cw=Math.min(cropSize,w-x0),ch=Math.min(cropSize,h-y0);
        var canvas=document.createElement("canvas");
        canvas.width=cw;canvas.height=ch;
        var ctx=canvas.getContext("2d");
        ctx.drawImage(fullImg,x0,y0,cw,ch,0,0,cw,ch);
        return canvas.toDataURL("image/jpeg",0.85).split(",")[1]});
      // Build a multi-image Claude request — each crop sent with the full image for context
      var base64=imgSrc.split(",")[1];
      var mediaType=imgSrc.indexOf("data:image/jpeg")===0?"image/jpeg":imgSrc.indexOf("data:image/png")===0?"image/png":"image/png";
      // Build content array: full image first, then each crop
      var content=[
        {type:"text",text:"Below is an ad followed by "+crops.length+" CROPPED regions from that ad. Each crop shows what a viewer would see at a specific fixation point. Describe EXACTLY what is visible in each CROP in 2-5 words. Be literal: if the crop shows text, quote the text. If it shows part of a face, say which part (e.g. 'Woman's eye'). If it's a blurred background, say 'Grass texture' or 'Forest background'. Do NOT describe what's in the full ad — only describe the contents of each numbered crop below.\n\nHere's the full ad for context:"},
        {type:"image",source:{type:"base64",media_type:mediaType,data:base64}}];
      crops.forEach(function(cropB64,i){
        content.push({type:"text",text:"Crop #"+(i+1)+" (fixation "+(i+1)+"):"});
        content.push({type:"image",source:{type:"base64",media_type:"image/jpeg",data:cropB64}})});
      content.push({type:"text",text:"Now respond with ONLY a JSON array of "+crops.length+" short strings describing each crop in order, no markdown:\n[\"description of crop 1\", \"description of crop 2\", ...]"});
      fetch("/api/claude",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:800,
          messages:[{role:"user",content:content}]})
      }).then(function(r){if(!r.ok)throw new Error(r.status);return r.json()}).then(function(data){
        try{
          var text=(data.content||[]).map(function(c){return c.text||""}).join("");
          var descriptions=JSON.parse(text.replace(/```json|```/g,"").trim());
          if(Array.isArray(descriptions)){
            var updated=Object.assign({},spData,{scanpath:spData.scanpath.map(function(f,i){
              return Object.assign({},f,{description:descriptions[i]||null})})});
            setScanpath(updated)}
        }catch(ex){console.log("Scanpath description parse error:",ex)}
      }).catch(function(ex){console.log("Scanpath description fetch error:",ex)})};
    fullImg.src=imgSrc}

  // Run temporal attention analysis on video frames
  // - Per-frame neural saliency
  // - Detect hook frame (peak attention in first 1.5s)
  // - Detect money frame (overall peak)
  // - Detect scene changes
  // - Run AI analysis on hook frame for brand/audience/whitespace
  function runVideoTemporalAnalysis(frames,duration){
    if(!frames||!frames.length)return;
    // Initialize temporal data structure
    var temporal={
      frames:frames.map(function(f,i){return{
        time:f.time||(i*(duration/frames.length)),
        index:i,
        thumbnail:f.thumb||f.dataUrl||f.imgSrc,
        attention:null,
        sceneChange:false,
        hasText:false,
        hasFace:false}}),
      duration:duration,
      hookFrameIndex:null,
      moneyFrameIndex:null,
      sceneChanges:[],
      avgAttention:0,
      attentionDropoffs:[]};
    setVideoTemporal(temporal);
    
    // Process each frame's neural saliency in sequence
    var frameIdx=0;
    function processNextFrame(){
      if(frameIdx>=frames.length){
        // All frames processed — compute summary stats
        finalizeTemporalAnalysis(temporal);
        return}
      var frame=frames[frameIdx];
      var imgSrc=frame.thumb||frame.dataUrl||frame.imgSrc;
      if(!imgSrc){frameIdx++;processNextFrame();return}
      // Use the existing frame's adj score as attention (faster than re-running neural per frame)
      // We could call /api/saliency for true neural, but for video that's 15+ API calls
      // Instead use the already-computed adj score from extractFrames
      temporal.frames[frameIdx].attention=frame.adj||0.5;
      setVideoTemporal(Object.assign({},temporal,{frames:temporal.frames.slice()}));
      frameIdx++;
      // Slight delay to allow UI to update progressively
      setTimeout(processNextFrame,30)}
    processNextFrame();
    
    // In parallel, run full AI analysis on the first frame (the hook)
    // This gets brand/audience/whitespace data without waiting for all frames
    var firstFrame=frames[0];
    var hookSrc=firstFrame&&(firstFrame.thumb||firstFrame.dataUrl||firstFrame.imgSrc);
    if(hookSrc){
      // Reuse the same Claude extraction prompt
      runAIAnalysisOnFrame(hookSrc,function(parsed){
        // Store the hook frame's analysis as the overall video's adPurpose
        if(parsed){
          setAdPurpose(Object.assign({},parsed,{source:"claude_api_video_hook",note:"AI analysis of hook frame (first 1-2s)"}));
          if(parsed.headline||parsed.copy){
            var fullCopy=[parsed.headline||"",parsed.copy||""].filter(Boolean).join("\n");
            if(fullCopy.trim())setCopyText(fullCopy)}
          if(parsed.offer){var os=parsed.offer;if(parsed.promo_code)os+=" \u2014 Code: "+parsed.promo_code;setOfferText(os)}
          else if(parsed.promo_code)setOfferText("Code: "+parsed.promo_code)}})}}
  
  // Finalize temporal analysis — compute hook, money frame, scene changes, dropoffs
  function finalizeTemporalAnalysis(temporal){
    var frames=temporal.frames.filter(function(f){return f.attention!==null});
    if(!frames.length)return;
    // Money frame = highest overall attention
    var moneyIdx=0,maxAtt=-1;
    frames.forEach(function(f,i){if(f.attention>maxAtt){maxAtt=f.attention;moneyIdx=f.index}});
    temporal.moneyFrameIndex=moneyIdx;
    // Hook frame = highest attention in first 1.5 seconds
    var hookCandidates=frames.filter(function(f){return f.time<=1.5});
    if(hookCandidates.length){
      var hookFrame=hookCandidates.reduce(function(best,f){return f.attention>best.attention?f:best});
      temporal.hookFrameIndex=hookFrame.index}
    else temporal.hookFrameIndex=frames[0].index;
    // Average attention
    temporal.avgAttention=frames.reduce(function(sum,f){return sum+f.attention},0)/frames.length;
    // Detect attention dropoffs (frames where attention drops >25% from previous)
    for(var i=1;i<frames.length;i++){
      var drop=frames[i-1].attention-frames[i].attention;
      if(drop>0.25){
        temporal.attentionDropoffs.push({
          fromTime:frames[i-1].time,toTime:frames[i].time,
          fromAttention:frames[i-1].attention,toAttention:frames[i].attention,
          dropMagnitude:drop})}}
    // Scene change detection — significant attention pattern shift between consecutive frames
    // (Simplified: large attention swings = likely scene change)
    for(var j=1;j<frames.length;j++){
      var diff=Math.abs(frames[j].attention-frames[j-1].attention);
      if(diff>0.15){frames[j].sceneChange=true;
        temporal.sceneChanges.push({time:frames[j].time,index:frames[j].index})}}
    setVideoTemporal(Object.assign({},temporal))}
  
  // Run AI analysis on a single frame (used for video hook analysis)

    if(!base64)return;

          {type:"image",source:{type:"base64",media_type:mediaType,data:base64}},

nused\"],\n    \"differentiation_angle\":\"ONE sentence describing the strongest opportunity\"\n  }\n}"}]}]})
    }).then(function(r){if(!r.ok)throw new Error(r.status);return r.json()}).then(function(data){
      try{

        var parsed=JSON.parse(text.replace(/```json|```/g,"").trim());

  function extractFromAd(imgSrc){
    var imageSrc=imgSrc||src;
    if(!imageSrc||isVideo)return;
    if(extracting)return;
    setExtracting(true);setAdPurpose(null);

    var base64=null;var mediaType="image/png";
    if(imageSrc.indexOf("data:image")===0){
      base64=imageSrc.split(",")[1];
      if(imageSrc.indexOf("data:image/jpeg")===0)mediaType="image/jpeg";
      else if(imageSrc.indexOf("data:image/gif")===0)mediaType="image/gif";
      else if(imageSrc.indexOf("data:image/webp")===0)mediaType="image/webp"}

    // Resize image before sending to API to reduce payload size
    if(base64){
      var resizeImg=new Image();
      resizeImg.onload=function(){
        var maxApi=800;var aw=resizeImg.naturalWidth,ah=resizeImg.naturalHeight;
        if(Math.max(aw,ah)>maxApi){var asc=maxApi/Math.max(aw,ah);aw=Math.round(aw*asc);ah=Math.round(ah*asc)}
        var acv=document.createElement("canvas");acv.width=aw;acv.height=ah;
        acv.getContext("2d").drawImage(resizeImg,0,0,aw,ah);
        var smallBase64=acv.toDataURL("image/jpeg",0.85).split(",")[1];
        runApiExtract(smallBase64,"image/jpeg",imageSrc)};
      resizeImg.onerror=function(){runApiExtract(base64,mediaType,imageSrc)};
      resizeImg.src=imageSrc}
    else{tryTesseractFallback(imageSrc)}
  }

  function runApiExtract(base64,mediaType,imageSrc){

    // Always use the local server proxy — direct browser calls to Anthropic
    // are blocked by CORS and would expose the API key client-side.
    var apiUrl="/api/claude";
    fetch(apiUrl,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",max_tokens:4000,
        messages:[{role:"user",content:[

      // AND (b) enough elapsed time has passed AND (c) all previous stages are done.
      // Otherwise it's "active" if it's the first not-yet-done stage.
      var stages=[];
      var prevDone=true;
      for(var si=0;si<stageDefs.length;si++){
        var def=stageDefs[si];
        var displayDone=def.rawDone&&elapsedMs>=def.minMs&&prevDone;
        var displayActive=!displayDone&&prevDone&&(busy||extracting);
        stages.push({key:def.key,label:def.label,weight:def.weight,
          done:displayDone,active:displayActive});
        prevDone=displayDone;
      }
      // Compute weighted progress: sum weights of done stages + partial credit for active
      var pctComplete=0;
      var seenActive=false;
      for(var si2=0;si2<stages.length;si2++){
        var st=stages[si2];
        if(st.done){pctComplete+=st.weight}
        else if(st.active&&!seenActive){
          // Partial credit grows over time inside this stage, but caps at 80% of weight
          var stageStart=si2>0?stageDefs[si2-1].minMs:0;
          var stageDur=stageDefs[si2].minMs-stageStart;
          var stageElapsed=Math.max(0,elapsedMs-stageStart);
          var stagePct=Math.min(0.8,stageElapsed/Math.max(stageDur,1));
          pctComplete+=st.weight*stagePct;
          seenActive=true;
        }
      }
      pctComplete=Math.min(99,Math.round(pctComplete));
      // If everything is truly done, snap to 100
      var allDone=stages.every(function(s){return s.done});
      if(allDone)pctComplete=100;
      return e("div",{className:"apertur-loading"},
        e("div",{className:"apertur-loading-inner"},
          // Animated mark
          e("div",{className:"apertur-loading-mark"},
            e("div",{className:"apertur-loading-ring"}),
            e("div",{className:"apertur-loading-ring-2"}),
            e("div",{className:"apertur-loading-dot"})),
          // Title
          e("div",{className:"apertur-loading-title"},
            "Analysing ",e("em",null,"your creative")),
          // Sub
          e("div",{className:"apertur-loading-sub"},
            "Running visual mapping, attention prediction, and AI analysis. This usually takes 30-60 seconds."),
          // Stages
          e("div",{className:"apertur-loading-stages"},
            stages.map(function(s,i){
              var cls="apertur-loading-stage";
              if(s.done)cls+=" done";
              else if(s.active)cls+=" active";
              return e("div",{key:s.key,className:cls},
                e("div",{className:"apertur-stage-icon"},s.done?"\u2713":(i+1)),
                e("div",{className:"apertur-stage-label"},s.label),
                s.done?e("div",{className:"apertur-stage-time"},"DONE"):s.active?e("div",{className:"apertur-stage-time"},"\u2022\u2022\u2022"):null)})),
          // Progress bar
          e("div",{className:"apertur-loading-progress"},
            e("div",{className:"apertur-loading-progress-fill",style:{width:pctComplete+"%"}})),
          // Hint
          e("div",{className:"apertur-loading-hint"},
            progress?progress.toUpperCase():(pctComplete+"% COMPLETE"))))
    })():null
  )))}

try{ReactDOM.render(e(App),document.getElementById("root"))}catch(err){document.getElementById("root").innerHTML="<div style='color:#E8503A;padding:40px;font-family:monospace'><h2>CARF Error</h2><pre>"+err.message+"</pre><pre>"+err.stack+"</pre></div>";console.error("CARF render error:",err)}
</script></body></html>
